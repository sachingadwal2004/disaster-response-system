# ============================================================
# DATABASE — values overridden by Render environment variables
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/disaster_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — prevents Railway MySQL timeout drops
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# SQL INIT
# ============================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================================
# SERVER — Render injects PORT automatically
# ============================================================
server.port=${PORT:8080}

# ============================================================
# JWT — FIX: Render env var was 23 chars, HS256 needs >=32
# ============================================================
jwt.secret=${JWT_SECRET:DisasterResponseSystemSecretKey2024VeryLongSecretKeyForJWT}
jwt.expiration=86400000
