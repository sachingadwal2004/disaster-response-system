# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# SQL INIT — run data.sql on EVERY startup
# defer-datasource-initialization ensures JPA
# creates tables BEFORE data.sql runs
# ============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================
# SERVER
# ============================================
server.port=8080

# ============================================
# JWT SECRET (change in production)
# ============================================
jwt.secret=DisasterResponseSystemSecretKey2024VeryLongSecretKeyForJWT
jwt.expiration=86400000
